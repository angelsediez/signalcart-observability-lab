services:
  postgres:
    image: postgres:17-alpine
    container_name: signalcart-postgres
    environment:
      POSTGRES_DB: signalcart
      POSTGRES_USER: signalcart
      POSTGRES_PASSWORD: signalcart-local-password
    volumes:
      - signalcart-postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalcart -d signalcart"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - signalcart-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: signalcart-api:local
    container_name: signalcart-api
    environment:
      APP_NAME: SignalCart API
      APP_VERSION: 0.1.0
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://signalcart:signalcart-local-password@postgres:5432/signalcart
      SIMULATION_MODE: "false"
      SIMULATION_TOKEN: change-me-for-local-lab-only
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalcart-net

  nginx:
    image: nginx:1.27-alpine
    container_name: signalcart-nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalcart-net

volumes:
  signalcart-postgres-data:

networks:
  signalcart-net:
    driver: bridge
