services:
  postgres:
    image: postgres:17-alpine
    container_name: signalcart-postgres
    environment:
      POSTGRES_DB: signalcart
      POSTGRES_USER: signalcart
      POSTGRES_PASSWORD: signalcart-local-password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - signalcart-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signalcart -d signalcart"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - signalcart-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: signalcart-api:local
    container_name: signalcart-api
    environment:
      APP_NAME: SignalCart API
      APP_VERSION: 0.1.0
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://signalcart:signalcart-local-password@postgres:5432/signalcart
      SIMULATION_MODE: "false"
      SIMULATION_TOKEN: change-me-for-local-lab-only
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live', timeout=3).read()\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalcart-net

  nginx:
    image: nginx:1.27-alpine
    container_name: signalcart-nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health/live >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalcart-net

  prometheus:
    image: prom/prometheus:v3.5.2
    container_name: signalcart-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts:/etc/prometheus/rules:ro
      - signalcart-prometheus-data:/prometheus
    depends_on:
      api:
        condition: service_healthy
      nginx:
        condition: service_healthy
      postgres-exporter:
        condition: service_started
      node-exporter:
        condition: service_started
      cadvisor:
        condition: service_started
      blackbox-exporter:
        condition: service_started
      alertmanager:
        condition: service_started
    networks:
      - signalcart-net

  node-exporter:
    image: prom/node-exporter:v1.11.0
    container_name: signalcart-node-exporter
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - signalcart-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: signalcart-cadvisor
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    expose:
      - "8080"
    networks:
      - signalcart-net

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.18.0
    container_name: signalcart-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://signalcart:signalcart-local-password@postgres:5432/signalcart?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9187"
    networks:
      - signalcart-net

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    container_name: signalcart-blackbox-exporter
    command:
      - "--config.file=/etc/blackbox_exporter/config.yml"
    volumes:
      - ./docker/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    expose:
      - "9115"
    networks:
      - signalcart-net


  grafana:
    image: grafana/grafana:13.0.1
    container_name: signalcart-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - signalcart-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - signalcart-net


  alertmanager:
    image: prom/alertmanager:v0.32.0
    container_name: signalcart-alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.listen-address=0.0.0.0:9093"
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./docker/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - signalcart-alertmanager-data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:9093/-/ready >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - signalcart-net

volumes:
  signalcart-postgres-data:
  signalcart-prometheus-data:
  signalcart-grafana-data:
  signalcart-alertmanager-data:

networks:
  signalcart-net:
    driver: bridge
